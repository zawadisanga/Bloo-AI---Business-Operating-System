<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloo AI - Business OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    
    <nav class="bg-black/30 backdrop-blur-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-white text-xl font-bold">Bloo AI</div>
            <div id="nav-buttons">
                <button onclick="showLogin()" class="px-4 py-2 bg-purple-600 rounded-lg text-white">Login</button>
                <button onclick="showRegister()" class="px-4 py-2 bg-blue-600 rounded-lg text-white ml-2">Register</button>
            </div>
            <div id="nav-user" class="hidden text-white">
                <span id="user-email"></span>
                <button onclick="logout()" class="ml-4 px-3 py-1 bg-red-500 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Login Form -->
        <div id="login-form" class="max-w-md mx-auto glass-card rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-white mb-4">Login</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
            <button onclick="login()" class="w-full p-3 bg-purple-600 rounded-lg text-white font-bold">Login</button>
            <p class="text-white/60 text-center mt-4">No account? <button onclick="showRegister()" class="text-purple-400">Register</button></p>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="hidden max-w-md mx-auto glass-card rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-white mb-4">Register</h2>
            <input type="text" id="reg-business" placeholder="Business Name" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
            <input type="password" id="reg-password" placeholder="Password (min 6 chars)" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
            <select id="reg-plan" class="w-full p-3 rounded-lg mb-3 bg-white/10 text-white">
                <option value="small">Small - $50/mo</option>
                <option value="growth">Growth - $500/mo</option>
            </select>
            <button onclick="register()" class="w-full p-3 bg-purple-600 rounded-lg text-white font-bold">Register</button>
            <p class="text-white/60 text-center mt-4">Have account? <button onclick="showLogin()" class="text-purple-400">Login</button></p>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card rounded-xl p-6">
                    <div class="text-purple-300">Revenue</div>
                    <div class="text-2xl font-bold text-white" id="stat-revenue">$0</div>
                </div>
                <div class="glass-card rounded-xl p-6">
                    <div class="text-purple-300">Messages</div>
                    <div class="text-2xl font-bold text-white" id="stat-messages">0</div>
                </div>
                <div class="glass-card rounded-xl p-6">
                    <div class="text-purple-300">Automations</div>
                    <div class="text-2xl font-bold text-white" id="stat-automations">0</div>
                </div>
            </div>

            <div class="glass-card rounded-xl p-6">
                <h3 class="text-xl font-bold text-white mb-4">AI CEO Advisor</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="number" id="revenue" placeholder="Revenue ($)" class="p-3 rounded-lg bg-white/10 text-white">
                    <input type="number" id="costs" placeholder="Costs ($)" class="p-3 rounded-lg bg-white/10 text-white">
                    <input type="number" id="customers" placeholder="Customers" class="p-3 rounded-lg bg-white/10 text-white">
                </div>
                <button onclick="getCEOAdvice()" class="px-6 py-2 bg-purple-600 rounded-lg text-white">Get AI Advice</button>
                <div id="advice-result" class="mt-4 text-purple-200"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let authToken = localStorage.getItem('token');

        if (authToken) {
            showDashboard();
            loadStats();
        }

        async function login() {
            const res = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                authToken = data.token;
                showDashboard();
                loadStats();
            } else {
                alert('Login failed: ' + (data.error || 'Check credentials'));
            }
        }

        async function register() {
            const res = await fetch(`${API_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    businessName: document.getElementById('reg-business').value,
                    plan: document.getElementById('reg-plan').value
                })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                authToken = data.token;
                showDashboard();
                loadStats();
            } else {
                alert('Registration failed: ' + (data.error || 'Try different email'));
            }
        }

        function logout() {
            localStorage.clear();
            authToken = null;
            showAuth();
        }

        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        function showAuth() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('nav-buttons').classList.remove('hidden');
            document.getElementById('nav-user').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('nav-buttons').classList.add('hidden');
            document.getElementById('nav-user').classList.remove('hidden');
        }

        async function getCEOAdvice() {
            const revenue = parseFloat(document.getElementById('revenue').value) || 10000;
            const costs = parseFloat(document.getElementById('costs').value) || 7000;
            const customers = parseInt(document.getElementById('customers').value) || 100;

            const res = await fetch(`${API_URL}/api/ai/ceo/advice`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                },
                body: JSON.stringify({ revenue, costs, customers })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('advice-result').innerHTML = `
                    <pre class="whitespace-pre-wrap">${JSON.stringify(data.data, null, 2)}</pre>
                `;
            }
        }

        async function loadStats() {
            const res = await fetch(`${API_URL}/api/dashboard/stats`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('stat-revenue').innerText = `$${data.data.business?.revenue || 0}`;
                document.getElementById('stat-messages').innerText = data.data.stats.totalMessages;
                document.getElementById('stat-automations').innerText = data.data.stats.totalAutomations;
            }
        }
    </script>
</body>
</html>
